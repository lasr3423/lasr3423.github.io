services:
  postgres:
    image: postgres:16
    container_name: readme-postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-readme}
      POSTGRES_USER: ${DB_USERNAME:-postgres}
      POSTGRES_PASSWORD: ${DB_PASSWORD:-postgres}
    ports:
      - "${LOCAL_DB_PORT:-5433}:5432"
    volumes:
      - readme_postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${DB_USERNAME:-postgres} -d ${POSTGRES_DB:-readme}"]
      interval: 10s
      timeout: 5s
      retries: 10

volumes:
  readme_postgres_data:
    external: true
    name: readme_postgres_data
