services:
  postgres:
    image: postgres:16
    container_name: readme-postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-readme}
      POSTGRES_USER: ${DB_USERNAME:-postgres}
      POSTGRES_PASSWORD: ${DB_PASSWORD:-postgres}
    ports:
      - "${POSTGRES_PORT:-5420}:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${DB_USERNAME:-postgres} -d ${POSTGRES_DB:-readme}"]
      interval: 10s
      timeout: 5s
      retries: 10

  backend:
    build:
      context: ./readme
      dockerfile: Dockerfile
    container_name: readme-backend
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      SPRING_DATASOURCE_URL: jdbc:postgresql://postgres:5432/${POSTGRES_DB:-readme}
      DB_USERNAME: ${DB_USERNAME:-postgres}
      DB_PASSWORD: ${DB_PASSWORD:-postgres}
      JWT_SECRET: ${JWT_SECRET:-change-me-to-a-long-random-secret}
      GOOGLE_CLIENT_ID: ${GOOGLE_CLIENT_ID:-}
      GOOGLE_CLIENT_SECRET: ${GOOGLE_CLIENT_SECRET:-}
      KAKAO_CLIENT_ID: ${KAKAO_CLIENT_ID:-}
      KAKAO_CLIENT_SECRET: ${KAKAO_CLIENT_SECRET:-}
      KAKAO_REDIRECT_URI: ${KAKAO_REDIRECT_URI:-http://localhost:8202/api/oauth/kakao/callback}
      APP_BASE_URL: ${APP_BASE_URL:-http://localhost}
      FRONT_OAUTH_REDIRECT_URI: ${FRONT_OAUTH_REDIRECT_URI:-http://localhost/oauth/callback}
      CORS_ALLOWED_ORIGINS: ${CORS_ALLOWED_ORIGINS:-http://localhost}
      FILE_UPLOAD_DIR: /app/uploads
      KAKAO_BOOK_API_BASE_URL: ${KAKAO_BOOK_API_BASE_URL:-https://dapi.kakao.com/v3/search/book}
      KAKAO_BOOK_REST_API_KEY: ${KAKAO_BOOK_REST_API_KEY:-}
      TOSS_CLIENT_KEY: ${TOSS_CLIENT_KEY:-}
      TOSS_SECRET_KEY: ${TOSS_SECRET_KEY:-}
      KAKAO_SECRET_KEY: ${KAKAO_SECRET_KEY:-}
      NAVER_PAY_CLIENT_ID: ${NAVER_PAY_CLIENT_ID:-}
      NAVER_PAY_CLIENT_SECRET: ${NAVER_PAY_CLIENT_SECRET:-}
      NAVER_PAY_CHAIN_ID: ${NAVER_PAY_CHAIN_ID:-}
      NAVER_PAY_MERCHANT_ID: ${NAVER_PAY_MERCHANT_ID:-}
      SEED_MEMBERS_ENABLED: ${SEED_MEMBERS_ENABLED:-false}
      SEED_COMMERCE_ENABLED: ${SEED_COMMERCE_ENABLED:-false}
      SEED_API_PRODUCT_COUNT: ${SEED_API_PRODUCT_COUNT:-1000}
    expose:
      - "8202"
    volumes:
      - uploads_data:/app/uploads

  frontend:
    build:
      context: ./readme_vue
      dockerfile: Dockerfile
      args:
        VITE_API_BASE_URL: /api
    container_name: readme-frontend
    restart: unless-stopped
    depends_on:
      - backend
    ports:
      - "${FRONTEND_PORT:-80}:80"

volumes:
  postgres_data:
  uploads_data:
